name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      # 3. Build Spring Boot JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Copy JAR to EC2 (IMPORTANT: overwrite enabled + exact file)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "target/aws-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/target/"
          overwrite: true

      # 5. Restart Spring Boot on EC2
      - name: Restart Spring Boot App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            echo "Restarting Spring Boot..."
            sudo systemctl daemon-reload
            sudo systemctl restart springboot
            sudo systemctl status springboot --no-pager